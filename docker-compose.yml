services:
  zookeeper:
    image: wurstmeister/zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    restart: unless-stopped
    networks:
      - spark-net

  kafka:
    image: wurstmeister/kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    restart: unless-stopped
    networks:
      - spark-net

  kafka-client:
    build:
      context: .
      dockerfile: ./src/kafka/Dockerfile
    container_name: kafka-client
    environment:
      KAFKA_BROKER: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}"
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - spark-net

  spark-master:
    image: ${SPARK_IMAGE:-bitnamilegacy/spark:3.5.0}
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - .:/opt/spark/work-dir
      - ./data:/data
    networks:
      - spark-net

  spark-worker-1:
    build:
      context: .
      dockerfile: ./src/spark/Dockerfile
    container_name: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=${SPARK_MASTER_URL:-spark://spark-master:7077}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-3G}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-2}
    depends_on:
      - spark-master
    volumes:
      - ./data:/data
    command: >
      bash -c "/opt/bitnami/spark/sbin/start-worker.sh spark://spark-master:7077"
    networks:
      - spark-net

  spark-worker-2:
    build:
      context: .
      dockerfile: ./src/spark/Dockerfile
    container_name: spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=${SPARK_MASTER_URL:-spark://spark-master:7077}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-3G}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-2}
    depends_on:
      - spark-master
    volumes:
      - ./data:/data
    command: >
      bash -c "/opt/bitnami/spark/sbin/start-worker.sh spark://spark-master:7077"
    networks:
      - spark-net

  spark-streaming:
    build:
      context: .
      dockerfile: ./src/spark/Dockerfile
    container_name: spark-streaming
    depends_on:
      - kafka
      - spark-master
    volumes:
      - ./data:/data
      - ./src/spark:/app
      - spark_checkpoints:/tmp/spark-checkpoints
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}"
      KAFKA_TOPIC: "${KAFKA_TOPIC:-transaction_data}"
      MODEL_PATH: "${MODEL_PATH:-/src/model/rf_model}"
      REFERENCE_DATA_PATH: "${REFERENCE_DATA_PATH:-/data/raw/fraudTrain.csv}"
      CHECKPOINT_LOCATION: "${CHECKPOINT_LOCATION:-/tmp/spark-checkpoints/fraud-stream}"
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DB: "${POSTGRES_DB:-streaming}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_TABLE: "${POSTGRES_TABLE:-fraud_predictions}"
      PROCESSING_TIME: "${PROCESSING_TIME:-10 seconds}"
      SPARK_SQL_SHUFFLE_PARTITIONS: "${SPARK_SQL_SHUFFLE_PARTITIONS:-4}"
    restart: unless-stopped
    networks:
      - spark-net

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "${POSTGRES_DB:-streaming}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./src/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - spark-net

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: streamlit
    depends_on:
      - postgres
      - spark-streaming
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    environment:
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DB: "${POSTGRES_DB:-streaming}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
    restart: unless-stopped
    networks:
      - spark-net

volumes:
  postgres_data:
  spark_checkpoints:

networks:
  spark-net:
    driver: bridge
